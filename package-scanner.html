<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>包裹扫码核验</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --border: #e1e5ea;
    --accent: #1a73e8;
    --green: #1e8e3e;
    --red: #d93025;
    --yellow: #f29900;
    --text: #1f2328;
    --muted: #6e7781;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
  }

  header .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), #bc8cff);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; }
  header .subtitle { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .stats-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat {
    background: var(--surface);
    padding: 10px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-num.total { color: var(--accent); }
  .stat-num.found { color: var(--green); }
  .stat-num.miss  { color: var(--red); }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    user-select: none;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .panel.active { display: flex; }

  /* ====== IMPORT PANEL ====== */
  .import-panel {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .import-panel label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: block;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 12px;
    resize: vertical;
    outline: none;
    line-height: 1.6;
    transition: border-color .2s;
  }

  textarea:focus { border-color: var(--accent); }

  textarea::placeholder { color: var(--muted); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 11px 20px;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity .15s, transform .1s;
    letter-spacing: 0.04em;
    user-select: none;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #0d1117;
    width: 100%;
  }

  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    width: 100%;
  }

  .order-list {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    max-height: 260px;
    overflow-y: auto;
  }

  .order-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .order-item:last-child { border-bottom: none; }

  .order-code { font-variant-numeric: tabular-nums; }

  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 100px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .badge-pending { background: rgba(139,148,158,.15); color: var(--muted); }
  .badge-found   { background: rgba(63,185,80,.15);  color: var(--green); }
  .badge-miss    { background: rgba(248,81,73,.15);  color: var(--red); }

  /* ====== SCAN PANEL ====== */
  .scan-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .camera-wrap {
    position: relative;
    background: #000;
    overflow: hidden;
    flex-shrink: 0;
  }

  #video {
    width: 100%;
    display: block;
    max-height: 280px;
    object-fit: cover;
  }

  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .scan-frame {
    width: 180px;
    height: 180px;
    position: relative;
  }

  .scan-frame::before,
  .scan-frame::after,
  .scan-frame > span::before,
  .scan-frame > span::after {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: var(--accent);
    border-style: solid;
  }

  .scan-frame::before  { top:0;    left:0;  border-width: 3px 0 0 3px; }
  .scan-frame::after   { top:0;    right:0; border-width: 3px 3px 0 0; }
  .scan-frame > span::before { bottom:0; left:0;  border-width: 0 0 3px 3px; }
  .scan-frame > span::after  { bottom:0; right:0; border-width: 0 3px 3px 0; }

  .scan-line {
    position: absolute;
    left: 8px; right: 8px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanline 2s ease-in-out infinite;
    top: 50%;
  }

  @keyframes scanline {
    0%   { transform: translateY(-80px); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(80px);  opacity: 0; }
  }

  .camera-status {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,.55);
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    color: var(--muted);
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }

  .scan-controls {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .btn-scan {
    flex: 1;
    background: var(--green);
    color: #0d1117;
  }

  .btn-stop {
    flex: 1;
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
  }

  /* Flash result */
  .result-flash {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    min-height: 68px;
    transition: background .3s;
  }

  .result-flash.flash-found { background: rgba(63,185,80,.12); }
  .result-flash.flash-miss  { background: rgba(248,81,73,.12); }

  .result-icon {
    font-size: 28px;
    flex-shrink: 0;
    line-height: 1;
  }

  .result-code {
    font-size: 14px;
    font-weight: 700;
    word-break: break-all;
  }

  .result-msg {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Scan log */
  .scan-log {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
  }

  .log-title {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 0 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
  }

  .log-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(225,229,234,.8);
    font-size: 12px;
  }

  .log-icon { font-size: 14px; flex-shrink: 0; }
  .log-code { flex: 1; word-break: break-all; }
  .log-time { color: var(--muted); font-size: 11px; flex-shrink: 0; }

  .empty-hint {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 24px 0;
  }

  /* Manual input */
  .manual-row {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  .manual-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
  }

  .manual-input:focus { border-color: var(--accent); }

  .btn-manual {
    background: var(--accent);
    color: #0d1117;
    padding: 9px 16px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    z-index: 999;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,.15);
  }

  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">📦</div>
  <div>
    <div class="h1" style="font-size:15px;font-weight:700;">包裹扫码核验</div>
    <div style="font-size:11px;color:var(--muted);">PACKAGE SCANNER</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-num total" id="s-total">0</div>
    <div class="stat-label">总单号</div>
  </div>
  <div class="stat">
    <div class="stat-num found" id="s-found">0</div>
    <div class="stat-label">已核验</div>
  </div>
  <div class="stat">
    <div class="stat-num miss" id="s-miss">0</div>
    <div class="stat-label">不在列表</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="import">📋 导入单号</div>
  <div class="tab"        data-tab="scan">📷 扫码核验</div>
</div>

<!-- IMPORT PANEL -->
<div class="panel active" id="panel-import">
  <div class="import-panel">
    <div>
      <label>粘贴或输入单号（每行一个）</label>
      <textarea id="raw-input" placeholder="请粘贴单号，每行一个&#10;例如：&#10;SF1234567890&#10;JD0987654321&#10;YT1122334455"></textarea>
    </div>
    <button class="btn btn-primary" onclick="importOrders()">✅ 导入单号</button>
    <button class="btn btn-danger" onclick="clearAll()">🗑 清空全部</button>

    <div id="order-list-wrap" style="display:none">
      <label id="list-label">单号列表</label>
      <div class="order-list" id="order-list"></div>
    </div>
  </div>
</div>

<!-- SCAN PANEL -->
<div class="panel" id="panel-scan">
  <div class="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none"></canvas>
    <div class="scan-overlay">
      <div class="scan-frame">
        <span></span>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="camera-status" id="cam-status">摄像头未启动</div>
  </div>

  <div class="scan-controls">
    <button class="btn btn-scan" id="btn-start" onclick="startCamera()">▶ 开始扫描</button>
    <button class="btn btn-stop" id="btn-stop"  onclick="stopCamera()" style="display:none">⏹ 停止</button>
  </div>

  <div class="result-flash" id="result-flash">
    <div class="result-icon" id="r-icon">⬜</div>
    <div>
      <div class="result-code" id="r-code" style="color:var(--muted)">等待扫描...</div>
      <div class="result-msg"  id="r-msg">将二维码/条形码对准框内</div>
    </div>
  </div>

  <div class="manual-row">
    <input class="manual-input" id="manual-in" placeholder="手动输入单号" />
    <button class="btn-manual" onclick="checkManual()">核验</button>
  </div>

  <div class="scan-log">
    <div class="log-title">扫描记录</div>
    <div id="log-body"><div class="empty-hint">暂无扫描记录</div></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
const orders = new Map(); // code → status: 'pending'|'found'|'miss'
let scanning = false;
let stream = null;
let animFrame = null;
let lastCode = '';
let lastCodeTime = 0;
const DEBOUNCE = 2000; // ms between same-code scans

// ── Tabs ───────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab, .panel').forEach(e => e.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
  });
});

// ── Import ─────────────────────────────────────────────
function importOrders() {
  const raw = document.getElementById('raw-input').value.trim();
  if (!raw) { toast('请先输入单号'); return; }

  const lines = raw.split(/[\n\r,，；;]+/)
    .map(s => s.trim())
    .filter(s => s.length > 0);

  let added = 0;
  lines.forEach(code => {
    if (!orders.has(code)) { orders.set(code, 'pending'); added++; }
  });

  renderOrderList();
  updateStats();
  toast(`✅ 已导入 ${added} 个单号（共 ${orders.size} 个）`);
  document.getElementById('raw-input').value = '';
}

function clearAll() {
  if (orders.size === 0) { toast('列表已为空'); return; }
  if (!confirm('确认清空全部单号和扫描记录？')) return;
  orders.clear();
  document.getElementById('log-body').innerHTML = '<div class="empty-hint">暂无扫描记录</div>';
  renderOrderList();
  updateStats();
  resetResult();
  toast('已清空');
}

function renderOrderList() {
  const wrap = document.getElementById('order-list-wrap');
  const list = document.getElementById('order-list');
  if (orders.size === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  document.getElementById('list-label').textContent = `单号列表（${orders.size} 个）`;
  list.innerHTML = [...orders.entries()].map(([code, status]) => `
    <div class="order-item">
      <span class="order-code">${esc(code)}</span>
      <span class="badge badge-${status}">${statusLabel(status)}</span>
    </div>
  `).join('');
}

function statusLabel(s) {
  return s === 'found' ? '✓ 已扫' : s === 'miss' ? '—' : '待扫';
}

// ── Camera ─────────────────────────────────────────────
async function startCamera() {
  if (orders.size === 0) { toast('请先在「导入单号」中添加单号'); return; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    scanning = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display = '';
    document.getElementById('cam-status').textContent = '扫描中…';
    tickScan();
  } catch(e) {
    toast('摄像头权限被拒绝，请在浏览器设置中允许');
    console.error(e);
  }
}

function stopCamera() {
  scanning = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('btn-start').style.display = '';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('cam-status').textContent = '摄像头已停止';
}

function tickScan() {
  if (!scanning) return;
  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
    if (code) {
      const now = Date.now();
      if (code.data !== lastCode || now - lastCodeTime > DEBOUNCE) {
        lastCode = code.data;
        lastCodeTime = now;
        processCode(code.data);
      }
    }
  }
  animFrame = requestAnimationFrame(tickScan);
}

// ── Check logic ────────────────────────────────────────
function processCode(code) {
  code = code.trim();
  const flash = document.getElementById('result-flash');
  flash.classList.remove('flash-found', 'flash-miss');

  if (orders.has(code)) {
    orders.set(code, 'found');
    showResult('✅', code, '在列表中 ✓', 'flash-found');
    addLog('✅', code, true);
    vibrate([100, 50, 100]);
  } else {
    orders.set(code, 'miss');  // track unknown too
    showResult('❌', code, '不在列表中 ✗', 'flash-miss');
    addLog('❌', code, false);
    vibrate([300]);
  }

  updateStats();
  renderOrderList();
}

function checkManual() {
  const inp = document.getElementById('manual-in');
  const code = inp.value.trim();
  if (!code) return;
  processCode(code);
  inp.value = '';
  inp.focus();
}

document.getElementById('manual-in').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkManual();
});

// ── UI helpers ─────────────────────────────────────────
function showResult(icon, code, msg, cls) {
  document.getElementById('r-icon').textContent = icon;
  document.getElementById('r-code').textContent = code;
  document.getElementById('r-msg').textContent  = msg;
  const flash = document.getElementById('result-flash');
  flash.className = 'result-flash ' + cls;
}

function resetResult() {
  document.getElementById('r-icon').textContent = '⬜';
  document.getElementById('r-code').textContent = '等待扫描...';
    document.getElementById('r-code').style.color = 'var(--muted)';
  document.getElementById('r-msg').textContent  = '将二维码/条形码对准框内';
  document.getElementById('result-flash').className = 'result-flash';
}

function addLog(icon, code, found) {
  const body = document.getElementById('log-body');
  if (body.querySelector('.empty-hint')) body.innerHTML = '';
  const now = new Date();
  const t = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
  const item = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML = `<span class="log-icon">${icon}</span>
    <span class="log-code" style="color:${found?'var(--green)':'var(--red)'}">${esc(code)}</span>
    <span class="log-time">${t}</span>`;
  body.insertBefore(item, body.firstChild);
}

function updateStats() {
  const total = orders.size;
  let found = 0, miss = 0;
  orders.forEach(v => { if (v==='found') found++; else if (v==='miss') miss++; });
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-found').textContent = found;
  document.getElementById('s-miss').textContent  = miss;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
