<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>包裹扫码核验</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root {
  --bg:#f5f7fa; --surface:#fff; --border:#e1e5ea;
  --accent:#1a73e8; --green:#1e8e3e; --red:#d93025;
  --text:#1f2328; --muted:#6e7781; --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SF Pro Text','Helvetica Neue',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;max-width:600px;margin:0 auto}

header{padding:14px 20px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface)}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#bc8cff);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

.stats-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--surface);padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:700;line-height:1}
.stat-num.total{color:var(--accent)}.stat-num.found{color:var(--green)}.stat-num.miss{color:var(--red)}
.stat-label{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.08em;text-transform:uppercase}

.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;user-select:none}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.panel.active{display:flex}

/* IMPORT */
.import-panel{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.field-label{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;display:block}
textarea{width:100%;min-height:140px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:13px;padding:12px;resize:vertical;outline:none;line-height:1.6;transition:border-color .2s}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:var(--radius);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s;letter-spacing:.04em;user-select:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;width:100%}
.btn-export{background:var(--green);color:#fff;width:100%}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red);width:100%}
.order-list{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;max-height:260px;overflow-y:auto}
.order-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px}
.order-item:last-child{border-bottom:none}
.badge{font-size:10px;padding:2px 7px;border-radius:100px;font-weight:700;letter-spacing:.04em;flex-shrink:0;margin-left:8px}
.badge-pending{background:rgba(110,119,129,.12);color:var(--muted)}
.badge-found{background:rgba(30,142,62,.12);color:var(--green)}

/* SCAN panel - 正常布局，摄像头按钮居中 */
.scan-idle{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px 20px}
.btn-scan-big{background:var(--green);color:#fff;font-size:16px;padding:16px 40px;border-radius:var(--radius);border:none;font-family:inherit;font-weight:700;cursor:pointer;letter-spacing:.04em}

/* 全屏扫描层 */
.fullscreen-scan{display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column}
.fullscreen-scan.active{display:flex}
#reader-fs{flex:1;width:100%;overflow:hidden}
#reader-fs video{width:100%!important;height:100%!important;object-fit:cover!important;display:block!important}

/* 全屏顶部工具栏 */
.fs-topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);z-index:10}
.fs-title{color:#fff;font-size:14px;font-weight:700}
.fs-stats{display:flex;gap:12px}
.fs-stat{font-size:12px;font-weight:700;padding:3px 10px;border-radius:100px;background:rgba(255,255,255,.15);color:#fff}
.btn-fs-stop{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;font-size:12px;padding:6px 14px;border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer}
.btn-fs-export{background:rgba(26,115,232,.8);border:none;color:#fff;font-size:12px;padding:6px 14px;border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer}

/* 底部手动输入栏 */
.fs-manual{position:absolute;bottom:0;left:0;right:0;display:flex;gap:8px;padding:12px 16px 28px;background:linear-gradient(to top,rgba(0,0,0,.7),transparent);z-index:10}
.fs-manual-input{flex:1;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;color:#fff;font-family:inherit;font-size:14px;padding:10px 14px;outline:none}
.fs-manual-input::placeholder{color:rgba(255,255,255,.5)}
.fs-manual-input:focus{border-color:rgba(255,255,255,.7)}
.btn-fs-manual{background:var(--accent);border:none;color:#fff;padding:10px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}

/* 扫描结果 Popup */
.scan-popup{position:absolute;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:20;min-width:260px;max-width:88vw}
.scan-popup.show{opacity:1;transform:translateX(-50%) translateY(0)}
.popup-inner{border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.popup-inner.found{background:rgba(20,110,40,.92)}
.popup-inner.miss{background:rgba(180,30,20,.88)}
.popup-icon{font-size:28px;line-height:1;flex-shrink:0}
.popup-code{font-size:15px;font-weight:700;color:#fff;word-break:break-all}
.popup-msg{font-size:12px;color:rgba(255,255,255,.8);margin-top:3px}

/* 扫描记录（非全屏时显示） */
.scan-log{flex:1;overflow-y:auto;padding:8px 16px;min-height:0}
.log-title{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:6px}
.log-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(225,229,234,.8);font-size:12px}
.log-icon{font-size:14px;flex-shrink:0}
.log-code{flex:1;word-break:break-all}
.log-time{color:var(--muted);font-size:11px;flex-shrink:0}
.empty-hint{text-align:center;color:var(--muted);font-size:12px;padding:24px 0}

/* EXPORT MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);width:100%;max-width:600px;border-radius:16px 16px 0 0;padding:20px 20px 36px;display:flex;flex-direction:column;gap:12px;animation:slideUp .25s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:15px;font-weight:700}
.modal-section{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.export-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:12px;max-height:110px;overflow-y:auto;line-height:2;white-space:pre-wrap;word-break:break-all;color:var(--text)}
.export-box .hit{color:var(--green);display:block}
.export-box .nope{color:var(--red);display:block}
.modal-btns{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.btn-copy{flex:1;background:var(--accent);color:#fff;min-width:80px}
.btn-csv{flex:1;background:#f5f7fa;color:var(--text);border:1px solid var(--border);min-width:80px}
.btn-close-m{flex:1;background:transparent;color:var(--muted);border:1px solid var(--border);min-width:80px}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);padding:10px 20px;border-radius:100px;font-size:13px;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.15)}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="logo">📦</div>
  <div>
    <div style="font-size:15px;font-weight:700">包裹扫码核验 v1.2</div>
    <div style="font-size:11px;color:var(--muted)">PACKAGE SCANNER</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-num total" id="s-total">0</div><div class="stat-label">总单号</div></div>
  <div class="stat"><div class="stat-num found" id="s-found">0</div><div class="stat-label">已核验</div></div>
  <div class="stat"><div class="stat-num miss"  id="s-miss">0</div><div class="stat-label">不在列表</div></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="import">📋 导入单号</div>
  <div class="tab"        data-tab="scan">📷 扫码核验</div>
</div>

<!-- IMPORT -->
<div class="panel active" id="panel-import">
  <div class="import-panel">
    <div>
      <label class="field-label">粘贴或输入单号（每行一个）</label>
      <textarea id="raw-input" placeholder="请粘贴单号，每行一个&#10;例如：&#10;SF1234567890&#10;JD0987654321&#10;YT1122334455"></textarea>
    </div>
    <button class="btn btn-primary" onclick="importOrders()">✅ 导入单号</button>
    <button class="btn btn-export"  onclick="openExport()">📤 导出核验报告</button>
    <button class="btn btn-danger"  onclick="clearAll()">🗑 清空全部</button>
    <div id="order-list-wrap" style="display:none">
      <label class="field-label" id="list-label">单号列表</label>
      <div class="order-list" id="order-list"></div>
    </div>
  </div>
</div>

<!-- SCAN -->
<div class="panel" id="panel-scan">
  <div class="scan-idle">
    <div style="font-size:48px">📷</div>
    <div style="font-size:16px;font-weight:700;color:var(--text)">扫码核验</div>
    <div style="font-size:13px;color:var(--muted);text-align:center">点击开始，摄像头全屏展开<br>扫到结果后自动弹出提示</div>
    <button class="btn-scan-big" onclick="startScan()">▶ 开始扫描</button>
    <button class="btn btn-exp-sm" style="background:var(--accent);color:#fff;font-size:13px;padding:10px 24px;border-radius:var(--radius)" onclick="openExport()">📤 导出报告</button>
  </div>
  <div class="scan-log" style="border-top:1px solid var(--border)">
    <div class="log-title">扫描记录</div>
    <div id="log-body"><div class="empty-hint">暂无扫描记录</div></div>
  </div>
</div>

<!-- 全屏扫描层 -->
<div class="fullscreen-scan" id="fs-scan">
  <div id="reader-fs"></div>

  <div class="fs-topbar">
    <div class="fs-title">📦 扫码核验</div>
    <div class="fs-stats">
      <span class="fs-stat" id="fs-found" style="background:rgba(30,142,62,.5)">✓ 0</span>
      <span class="fs-stat" id="fs-miss"  style="background:rgba(217,48,37,.45)">✗ 0</span>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-fs-export" onclick="openExport()">📤 导出</button>
      <button class="btn-fs-stop"   onclick="stopScan()">⏹ 停止</button>
    </div>
  </div>

  <!-- 结果 Popup -->
  <div class="scan-popup" id="scan-popup">
    <div class="popup-inner" id="popup-inner">
      <div class="popup-icon" id="popup-icon">✅</div>
      <div>
        <div class="popup-code" id="popup-code"></div>
        <div class="popup-msg"  id="popup-msg"></div>
      </div>
    </div>
  </div>

  <div class="fs-manual">
    <input class="fs-manual-input" id="fs-manual-in" placeholder="手动输入单号，按回车核验" />
    <button class="btn-fs-manual" onclick="checkFsManual()">核验</button>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeExportIfBg(event)">
  <div class="modal">
    <div class="modal-title">📤 核验报告</div>
    <div>
      <div class="modal-section">✅ 在列表中已扫到 (<span id="exp-found-count">0</span> 个)</div>
      <div class="export-box" id="exp-found"><span style="color:var(--muted)">（无）</span></div>
    </div>
    <div>
      <div class="modal-section">⏳ 列表中未扫到 (<span id="exp-pending-count">0</span> 个)</div>
      <div class="export-box" id="exp-pending"><span style="color:var(--muted)">（无）</span></div>
    </div>
    <div>
      <div class="modal-section">❌ 扫到但不在列表 (<span id="exp-miss-count">0</span> 个)</div>
      <div class="export-box" id="exp-miss"><span style="color:var(--muted)">（无）</span></div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-copy"    onclick="copyReport()">📋 复制文本</button>
      <button class="btn btn-csv"     onclick="downloadCSV()">💾 下载 CSV</button>
      <button class="btn btn-close-m" onclick="closeExport()">关闭</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── State ───────────────────────────────────
const orders  = new Map();  // code → 'pending'|'found'
const missLog = new Set();

let html5QrCode = null;
let scanActive  = false;

const DEBOUNCE_MS = 2000;
const lastSeen    = new Map();
let   resetTimer  = null;

// ─── Tabs ────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab,.panel').forEach(e => e.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
  });
});

// ─── Import ──────────────────────────────────
function importOrders() {
  const raw = document.getElementById('raw-input').value.trim();
  if (!raw) { toast('请先输入单号'); return; }
  const lines = raw.split(/[\n\r,，；;]+/).map(s => s.trim()).filter(Boolean);
  let added = 0;
  lines.forEach(code => { if (!orders.has(code)) { orders.set(code, 'pending'); added++; } });
  renderOrderList(); updateStats();
  toast('✅ 已导入 ' + added + ' 个单号（共 ' + orders.size + ' 个）');
  document.getElementById('raw-input').value = '';
}

function clearAll() {
  if (!orders.size && !missLog.size) { toast('列表已为空'); return; }
  if (!confirm('确认清空全部单号和扫描记录？')) return;
  orders.clear(); missLog.clear(); lastSeen.clear();
  document.getElementById('log-body').innerHTML = '<div class="empty-hint">暂无扫描记录</div>';
  renderOrderList(); updateStats(); resetResult();
  toast('已清空');
}

function renderOrderList() {
  const wrap = document.getElementById('order-list-wrap');
  if (!orders.size) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  document.getElementById('list-label').textContent = '单号列表（' + orders.size + ' 个）';
  document.getElementById('order-list').innerHTML = [...orders.entries()].map(([code, st]) =>
    '<div class="order-item"><span style="word-break:break-all;font-size:13px">' + esc(code) +
    '</span><span class="badge badge-' + st + '">' + (st==='found'?'✓ 已扫':'待扫') + '</span></div>'
  ).join('');
}

// ─── Scanner (html5-qrcode) ──────────────────
async function startScan() {
  if (orders.size === 0) { toast('请先在「导入单号」中添加单号'); return; }
  if (scanActive) return;

  if (html5QrCode) {
    try { await html5QrCode.stop(); } catch(e) {}
    html5QrCode = null;
  }

  // 展开全屏层
  document.getElementById('fs-scan').classList.add('active');

  html5QrCode = new Html5Qrcode('reader-fs');

  const config = {
    fps: 20,
    qrbox: (w, h) => {
      const side = Math.round(Math.min(w, h) * 0.65);
      return { width: side, height: Math.round(side * 0.6) };
    },
    aspectRatio: window.innerHeight / window.innerWidth,
    rememberLastUsedCamera: true,
    formatsToSupport: [
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.DATA_MATRIX,
      Html5QrcodeSupportedFormats.PDF_417,
    ]
  };

  try {
    await html5QrCode.start(
      { facingMode: 'environment' },
      config,
      (decodedText) => {
        const code = decodedText.trim();
        if (!code) return;
        const now = Date.now();
        if (lastSeen.has(code) && now - lastSeen.get(code) < DEBOUNCE_MS) return;
        lastSeen.set(code, now);
        processCode(code);
      },
      () => {}
    );
    scanActive = true;
  } catch(e) {
    console.error(e);
    document.getElementById('fs-scan').classList.remove('active');
    html5QrCode = null;
    let msg = e.message || String(e);
    if (/permission/i.test(msg)) msg = '未获得摄像头权限，请在浏览器设置中允许';
    toast('摄像头启动失败：' + msg);
  }
}

async function stopScan() {
  if (html5QrCode) {
    try { await html5QrCode.stop(); } catch(e) {}
    try { html5QrCode.clear(); }      catch(e) {}
    html5QrCode = null;
  }
  scanActive = false;
  document.getElementById('fs-scan').classList.remove('active');
  hidePopup();
}

// ─── Process Code ────────────────────────────
function processCode(code) {
  const found = orders.has(code);
  if (found) {
    orders.set(code, 'found');
    showPopup(true, code, '在列表中 ✓');
    addLog('✅', code, true);
    vibrate([80, 40, 80]);
    renderOrderList();
  } else {
    missLog.add(code);
    showPopup(false, code, '不在列表中 ✗');
    addLog('❌', code, false);
    vibrate([300]);
  }
  updateStats();
  updateFsStats();
  if (resetTimer) clearTimeout(resetTimer);
  resetTimer = setTimeout(hidePopup, 2000);
}

function checkFsManual() {
  const inp  = document.getElementById('fs-manual-in');
  const code = inp.value.trim();
  if (!code) return;
  lastSeen.delete(code);
  processCode(code);
  inp.value = '';
  inp.focus();
}
document.getElementById('fs-manual-in').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkFsManual();
});

// ─── Popup ───────────────────────────────────
function showPopup(found, code, msg) {
  const popup = document.getElementById('scan-popup');
  const inner = document.getElementById('popup-inner');
  document.getElementById('popup-icon').textContent = found ? '✅' : '❌';
  document.getElementById('popup-code').textContent = code;
  document.getElementById('popup-msg').textContent  = msg;
  inner.className = 'popup-inner ' + (found ? 'found' : 'miss');
  popup.classList.add('show');
}
function hidePopup() {
  document.getElementById('scan-popup').classList.remove('show');
}
function updateFsStats() {
  let found = 0;
  orders.forEach(v => { if (v === 'found') found++; });
  document.getElementById('fs-found').textContent = '✓ ' + found;
  document.getElementById('fs-miss').textContent  = '✗ ' + missLog.size;
}

function addLog(icon, code, found) {
  const body = document.getElementById('log-body');
  if (body.querySelector('.empty-hint')) body.innerHTML = '';
  const now = new Date();
  const t = [now.getHours(), now.getMinutes(), now.getSeconds()]
    .map(n => String(n).padStart(2,'0')).join(':');
  const item = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML = '<span class="log-icon">' + icon + '</span>' +
    '<span class="log-code" style="color:' + (found?'var(--green)':'var(--red)') + '">' + esc(code) + '</span>' +
    '<span class="log-time">' + t + '</span>';
  body.insertBefore(item, body.firstChild);
}

function updateStats() {
  let found = 0;
  orders.forEach(v => { if (v === 'found') found++; });
  document.getElementById('s-total').textContent = orders.size;
  document.getElementById('s-found').textContent = found;
  document.getElementById('s-miss').textContent  = missLog.size;
}

// ─── Export ──────────────────────────────────
function openExport() {
  const foundList   = [...orders.entries()].filter(([,v])=>v==='found').map(([k])=>k);
  const pendingList = [...orders.entries()].filter(([,v])=>v==='pending').map(([k])=>k);
  const missList    = [...missLog];
  const fill = (boxId, countId, arr, cls) => {
    document.getElementById(countId).textContent = arr.length;
    document.getElementById(boxId).innerHTML = arr.length
      ? arr.map(c=>'<span class="'+cls+'">'+esc(c)+'</span>').join('')
      : '<span style="color:var(--muted)">（无）</span>';
  };
  fill('exp-found',   'exp-found-count',   foundList,   'hit');
  fill('exp-pending', 'exp-pending-count', pendingList, '');
  fill('exp-miss',    'exp-miss-count',    missList,    'nope');
  document.getElementById('modal-bg').classList.add('open');
}
function closeExport()      { document.getElementById('modal-bg').classList.remove('open'); }
function closeExportIfBg(e) { if (e.target.id==='modal-bg') closeExport(); }

function buildReportText() {
  const foundList   = [...orders.entries()].filter(([,v])=>v==='found').map(([k])=>k);
  const pendingList = [...orders.entries()].filter(([,v])=>v==='pending').map(([k])=>k);
  const missList    = [...missLog];
  return [
    '包裹扫码核验报告  ' + new Date().toLocaleString('zh-CN'),
    '', '【在列表中已扫到】' + foundList.length + ' 个', ...foundList,
    '', '【列表中未扫到】'  + pendingList.length + ' 个', ...pendingList,
    '', '【扫到但不在列表】' + missList.length   + ' 个', ...missList,
  ].join('\n');
}

function copyReport() {
  const text = buildReportText();
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('✅ 已复制');
  };
  navigator.clipboard
    ? navigator.clipboard.writeText(text).then(()=>toast('✅ 已复制到剪贴板')).catch(fallback)
    : fallback();
}

function downloadCSV() {
  const foundList   = [...orders.entries()].filter(([,v])=>v==='found').map(([k])=>k);
  const pendingList = [...orders.entries()].filter(([,v])=>v==='pending').map(([k])=>k);
  const missList    = [...missLog];
  const rows = [['单号','状态'],
    ...foundList.map(c=>[c,'在列表中已扫到']),
    ...pendingList.map(c=>[c,'列表中未扫到']),
    ...missList.map(c=>[c,'扫到但不在列表'])];
  const csv = '\uFEFF' + rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})),
    download: '包裹核验_' + new Date().toLocaleDateString('zh-CN').replace(/\//g,'-') + '.csv'
  });
  a.click(); URL.revokeObjectURL(a.href);
  toast('💾 CSV 已下载');
}

// ─── Utils ───────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}
function vibrate(p) { try { navigator.vibrate && navigator.vibrate(p); } catch(e){} }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
